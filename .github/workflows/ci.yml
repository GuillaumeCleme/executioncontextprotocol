name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Build · Lint · Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck (spec → runtime → cli)
        run: npm run build
      - name: Generate schema
        run: npm run generate:schema
      - name: Lint (ESLint + markdownlint)
        run: npm run lint
      - name: Validate spec
        run: npm run validate
      - name: CLI smoke test
        run: npx tsx packages/cli/src/index.ts validate spec.yaml --input shopifyStoreId=test --input jiraProject=TEST

  test-unit:
    name: Unit Tests (Layer A + B)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run unit tests
        run: npm run test:unit
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: coverage/
          retention-days: 7

  test-integration:
    name: Integration Tests (Layer C)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run integration tests
        run: npm run test:integration
