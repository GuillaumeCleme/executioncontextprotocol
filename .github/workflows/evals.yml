name: evals

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Ollama model tag (must match pulled image)"
        required: false
        default: "gemma3:1b"
        type: string
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  eval:
    name: eval
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # workflow_dispatch has github.event.inputs; scheduled runs do not — defaults apply.
      EVAL_MODEL: ${{ github.event.inputs.model || 'gemma3:1b' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: ollama serve &

      - name: Wait for Ollama
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Pull model
        run: ollama pull "$EVAL_MODEL"

      - name: Run single-executor eval
        env:
          OLLAMA_MODEL: ${{ env.EVAL_MODEL }}
        run: |
          npx ecp run \
            examples/single-executor/context.yaml \
            --input topic="Execution Control Protocol" \
            --provider ollama \
            --model "$EVAL_MODEL" \
            --enable ollama \
            --debug

      - name: Run controller-specialist eval
        env:
          OLLAMA_MODEL: ${{ env.EVAL_MODEL }}
        run: |
          npx ecp run \
            examples/controller-specialist/context.yaml \
            --input subject="Model Context Protocol" \
            --provider ollama \
            --model "$EVAL_MODEL" \
            --enable ollama \
            --debug

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_number }}
          path: artifacts/
          retention-days: 30
